<!DOCTYPE html>
<html>
<head>
    <title>Session Sentinel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="header">
    <div class="header-left">
        <h1 class="app-title">
            <span id="statusDot" class="status-dot"></span>
            <span>Session Sentinel</span>
        </h1>
    </div>

    <button id="darkModeToggleButton" class="header-mode-toggle" onclick="toggleDarkModeFromButton()" aria-label="Toggle theme">
        <span id="darkModeIcon" class="dark-mode-icon">☾</span>
        <span id="darkModeLabel" class="dark-mode-label">Dark Mode</span>
    </button>
</div>

<div class="layout">

    <div class="main-content">
        <div class="container">

            <div class="card">
                <div class="section-header-row">
                    <h2 class="section-title">Current Apps</h2>

                    <div class="title-actions">
                        <button onclick="openAddAppModal()" class="action-btn add-btn">
                            Add App
                        </button>

                        <button onclick="toggleRemoveMode()" id="removeModeBtn" class="action-btn remove-mode-btn">
                            Remove App
                        </button>
                    </div>
                </div>

                <p id="currentIP" class="current-ip-inline">IP: Loading...</p>

                <div id="currentApps"></div>
            </div>

            <div class="card">
                <h2 onclick="toggleRecent()" class="clickable">
                    Recently Closed Apps ▼
                </h2>
                <div id="recentApps" style="display:none;"></div>
            </div>

        </div>
    </div>

    <aside id="alertsSidebar" class="alerts-sidebar">
        <div class="alerts-sidebar-inner">
            <div class="alerts-sidebar-scroll">
                <div class="alerts-sidebar-header-row">
                    <h2>Alerts</h2>
                    <button onclick="clearAlerts()" class="action-btn clear-alerts-btn">
                        Clear Alerts
                    </button>
                </div>

                <div id="alerts"></div>
            </div>

            <div class="alerts-sidebar-footer">
                <button onclick="simulateAttack()" class="btn sidebar-btn">
                    Simulate Attack
                </button>
            </div>
        </div>
    </aside>

</div>

<div id="alertModal" class="modal hidden">
    <div class="modal-content">
        <div class="modal-header">
            <h2>Alert Details</h2>
            <button class="close-btn" onclick="closeAlertModal()">×</button>
        </div>
        <div id="alertModalBody"></div>
    </div>
</div>

<div id="addAppModal" class="modal hidden">
    <div class="modal-content app-modal-content">
        <div class="modal-header">
            <h2>Add Running App</h2>
            <button class="close-btn" onclick="closeAddAppModal()">×</button>
        </div>

        <div class="app-modal-body">
            <p class="modal-subtext">Enter the name of an actively running app.</p>

            <div class="autocomplete-wrap">
                <input
                    id="addAppInput"
                    class="modal-input"
                    type="text"
                    placeholder="e.g. Steam"
                    autocomplete="off"
                >
                <div id="autocompleteList" class="autocomplete-list hidden"></div>
            </div>

            <p id="addAppMessage" class="modal-message"></p>

            <div class="modal-actions">
                <button class="action-btn add-btn modal-add-btn" onclick="submitAddApp()">Add App</button>
            </div>
        </div>
    </div>
</div>

<script>
let removeMode = false;
let latestRunningApps = [];
let selectedAutocompleteIndex = -1;
let darkModeEnabled = false;

function toggleRecent() {
    const el = document.getElementById("recentApps");
    el.style.display = el.style.display === "none" ? "block" : "none";
}

function toggleRemoveMode() {
    removeMode = !removeMode;
    const btn = document.getElementById("removeModeBtn");

    if (removeMode) {
        btn.classList.add("active-remove-mode");
        btn.textContent = "Done";
    } else {
        btn.classList.remove("active-remove-mode");
        btn.textContent = "Remove App";
    }

    loadData();
}

function formatTimestamp(value) {
    if (!value) return "Unknown";

    const date = new Date(value);
    if (isNaN(date.getTime())) return value;

    const now = new Date();
    const diffMs = now - date;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);

    if (diffMins < 1) return "Just now";
    if (diffMins < 60) return `${diffMins} min ago`;
    if (diffHours < 24) return `${diffHours} hr ago`;

    return date.toLocaleString("en-GB", {
        day: "numeric",
        month: "short",
        hour: "2-digit",
        minute: "2-digit"
    });
}

function renderMonitoringStatus(monitoring) {
    const dot = document.getElementById("statusDot");
    const lastHeartbeat = monitoring?.last_heartbeat ? new Date(monitoring.last_heartbeat) : null;
    const now = new Date();

    let active = false;
    if (lastHeartbeat && !isNaN(lastHeartbeat.getTime())) {
        const diff = now - lastHeartbeat;
        active = diff < 15000;
    }

    dot.classList.toggle("online", active);
    dot.classList.toggle("offline", !active);
}

function renderDarkModeButton(enabled) {
    darkModeEnabled = enabled;

    const icon = document.getElementById("darkModeIcon");
    const label = document.getElementById("darkModeLabel");

    icon.textContent = enabled ? "☀" : "☾";
    label.textContent = enabled ? "Light Mode" : "Dark Mode";

    document.body.classList.toggle("dark-mode", enabled);
}

function openAlertModal(alert) {
    const modal = document.getElementById("alertModal");
    const body = document.getElementById("alertModalBody");

    body.innerHTML = `
        <p><strong>Message:</strong> ${alert.message || "Unknown"}</p>
        <p><strong>Severity:</strong> ${alert.severity || "Unknown"}</p>
        <p><strong>App:</strong> ${alert.app || "Unknown"}</p>
        <p><strong>Time:</strong> ${formatTimestamp(alert.time)}</p>
        <pre>${JSON.stringify(alert.details || {}, null, 2)}</pre>
    `;

    modal.classList.remove("hidden");
}

function closeAlertModal() {
    document.getElementById("alertModal").classList.add("hidden");
}

function openAddAppModal() {
    document.getElementById("addAppModal").classList.remove("hidden");
    document.getElementById("addAppInput").value = "";
    document.getElementById("addAppMessage").textContent = "";
    hideAutocomplete();
    updateRunningAppsSuggestions();
    setTimeout(() => document.getElementById("addAppInput").focus(), 50);
}

function closeAddAppModal() {
    document.getElementById("addAppModal").classList.add("hidden");
    hideAutocomplete();
}

async function updateRunningAppsSuggestions() {
    try {
        const res = await fetch("/running-apps");
        const data = await res.json();
        latestRunningApps = data.running_apps || [];
    } catch (error) {
        console.error("Could not load running apps suggestions:", error);
    }
}

function getFilteredSuggestions(value) {
    const term = value.trim().toLowerCase();
    if (!term) return [];

    return latestRunningApps
        .filter(app => app.toLowerCase().includes(term))
        .slice(0, 6);
}

function renderAutocomplete(items) {
    const list = document.getElementById("autocompleteList");
    list.innerHTML = "";
    selectedAutocompleteIndex = -1;

    if (!items.length) {
        list.classList.add("hidden");
        return;
    }

    items.forEach((item, index) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = "autocomplete-item";
        row.textContent = item;
        row.onclick = () => {
            document.getElementById("addAppInput").value = item;
            hideAutocomplete();
            submitAddApp();
        };
        row.dataset.index = index;
        list.appendChild(row);
    });

    list.classList.remove("hidden");
}

function highlightAutocompleteItem() {
    const items = document.querySelectorAll(".autocomplete-item");
    items.forEach((item, index) => {
        item.classList.toggle("selected", index === selectedAutocompleteIndex);
    });
}

function hideAutocomplete() {
    const list = document.getElementById("autocompleteList");
    list.innerHTML = "";
    list.classList.add("hidden");
    selectedAutocompleteIndex = -1;
}

async function submitAddApp() {
    const input = document.getElementById("addAppInput");
    const message = document.getElementById("addAppMessage");
    const appName = input.value.trim();

    if (!appName) {
        message.textContent = "Please enter an app name.";
        message.className = "modal-message error-message";
        return;
    }

    try {
        const res = await fetch("/settings/apps", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ app_name: appName })
        });

        const result = await res.json();

        if (!res.ok || result.status !== "ok") {
            message.textContent = result.message || "App not found";
            message.className = "modal-message error-message";
            return;
        }

        message.textContent = result.message || "App added.";
        message.className = "modal-message success-message";

        await loadData();

        setTimeout(() => {
            closeAddAppModal();
        }, 700);
    } catch (error) {
        console.error("Add app failed:", error);
        message.textContent = "App not found";
        message.className = "modal-message error-message";
    }
}

async function removeApp(appName) {
    try {
        const res = await fetch("/settings/apps/remove", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ app_name: appName })
        });

        const result = await res.json();

        if (!res.ok || result.status !== "ok") {
            return;
        }

        await loadData();
    } catch (error) {
        console.error("Remove app failed:", error);
    }
}

async function simulateAttack() {
    await fetch("/simulate");
    loadData();
}

async function clearAlerts() {
    await fetch("/alerts/clear", { method: "POST" });
    loadData();
}

async function toggleDarkMode(enabled) {
    await fetch("/settings/dark-mode", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ enabled })
    });

    renderDarkModeButton(enabled);
}

function toggleDarkModeFromButton() {
    toggleDarkMode(!darkModeEnabled);
}

function buildAppCard(app, info, isCurrent) {
    const el = document.createElement("div");
    el.className = "card inner-card app-row-card";

    const safeApp = app.replace(/\\/g, "\\\\").replace(/'/g, "\\'");

    const removeButton = (removeMode && isCurrent)
        ? `<button class="inline-remove-x" onclick="event.stopPropagation(); removeApp('${safeApp}')">×</button>`
        : "";

    let statusText = `<span style="color:#22c55e">online</span>`;
    let extraLines = "";

    if (!isCurrent) {
        const lastSeen = info.last_seen || 0;
        const nowSeconds = Date.now() / 1000;
        const diff = nowSeconds - lastSeen;
        const offlineText = diff >= 300
            ? `<span class="offline-status">offline</span>`
            : `<span style="color:#ef4444">recently closed</span>`;

        statusText = offlineText;
        extraLines = `<br>Last Online: ${formatTimestamp(info.last_active)}`;
    }

    el.innerHTML = `
        <div class="app-row-layout">
            ${removeButton}
            <div class="app-row-content">
                <strong>${app}</strong><br>
                Status: ${statusText}<br>
                IP: ${info.ip || "unknown"}<br>
                Location: ${info.city || "unknown"}, ${info.country || "unknown"}${extraLines}
            </div>
        </div>
    `;

    return el;
}

async function loadData() {
    try {
        const res = await fetch("/data");
        const data = await res.json();

        renderMonitoringStatus(data.monitoring);

        const enabled = !!data.settings?.dark_mode;
        renderDarkModeButton(enabled);

        const currentDiv = document.getElementById("currentApps");
        const recentDiv = document.getElementById("recentApps");
        const alertsDiv = document.getElementById("alerts");
        const currentIPEl = document.getElementById("currentIP");

        currentDiv.innerHTML = "";
        recentDiv.innerHTML = "";
        alertsDiv.innerHTML = "";

        const activityEntries = Object.entries(data.activity || {});
        const recentEntries = Object.entries(data.recently_used || {});
        const alertEntries = data.alerts || [];

        if (activityEntries.length > 0) {
            const firstAppInfo = activityEntries[0][1];
            currentIPEl.textContent = `IP: ${firstAppInfo.ip || "Unknown"}`;
        } else {
            currentIPEl.textContent = "IP: No active IP data";
        }

        if (activityEntries.length === 0) {
            currentDiv.innerHTML = "<p>No apps currently active.</p>";
        } else {
            for (const [app, info] of activityEntries) {
                currentDiv.appendChild(buildAppCard(app, info, true));
            }
        }

        if (recentEntries.length === 0) {
            recentDiv.innerHTML = "<p>No recently closed apps.</p>";
        } else {
            for (const [app, info] of recentEntries) {
                recentDiv.appendChild(buildAppCard(app, info, false));
            }
        }

        if (alertEntries.length === 0) {
            alertsDiv.innerHTML = "<p>No alerts.</p>";
        } else {
            alertEntries.slice(-25).reverse().forEach(alert => {
                const el = document.createElement("div");
                const severityClass = alert.severity === "info" ? "info-alert" : (alert.severity || "medium");
                el.className = "alert " + severityClass;
                el.innerHTML = `
                    <div><strong>${alert.message}</strong></div>
                    <div class="alert-time">${formatTimestamp(alert.time)}</div>
                `;
                el.onclick = () => openAlertModal(alert);
                alertsDiv.appendChild(el);
            });
        }
    } catch (error) {
        console.error("loadData failed:", error);
    }
}

document.getElementById("addAppInput").addEventListener("input", () => {
    const input = document.getElementById("addAppInput");
    renderAutocomplete(getFilteredSuggestions(input.value));
});

document.getElementById("addAppInput").addEventListener("keydown", (e) => {
    const items = Array.from(document.querySelectorAll(".autocomplete-item"));

    if (e.key === "ArrowDown") {
        if (!items.length) return;
        e.preventDefault();
        selectedAutocompleteIndex = Math.min(selectedAutocompleteIndex + 1, items.length - 1);
        highlightAutocompleteItem();
        return;
    }

    if (e.key === "ArrowUp") {
        if (!items.length) return;
        e.preventDefault();
        selectedAutocompleteIndex = Math.max(selectedAutocompleteIndex - 1, 0);
        highlightAutocompleteItem();
        return;
    }

    if (e.key === "Enter") {
        e.preventDefault();

        if (selectedAutocompleteIndex >= 0 && items[selectedAutocompleteIndex]) {
            document.getElementById("addAppInput").value = items[selectedAutocompleteIndex].textContent;
            hideAutocomplete();
            submitAddApp();
            return;
        }

        submitAddApp();
    }

    if (e.key === "Escape") {
        hideAutocomplete();
    }
});

window.addEventListener("click", (e) => {
    const addModal = document.getElementById("addAppModal");
    const alertModal = document.getElementById("alertModal");
    const autocompleteWrap = document.querySelector(".autocomplete-wrap");

    if (e.target === addModal) closeAddAppModal();
    if (e.target === alertModal) closeAlertModal();

    if (autocompleteWrap && !autocompleteWrap.contains(e.target)) {
        hideAutocomplete();
    }
});

setInterval(loadData, 2000);
loadData();
</script>

</body>
</html>
